<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Spark - Lineage 血缘可视化</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f6f7f9; color: #20242a; }
    header { padding: 28px 32px 18px; background: #fff; border-bottom: 1px solid #d8dee8; }
    h1 { margin: 0 0 8px; font-size: 26px; }
    main { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 18px; max-width: 1120px; margin: 0 auto; }
    section { background: #fff; border: 1px solid #d8dee8; border-radius: 8px; box-shadow: 0 10px 26px rgba(22, 34, 51, .08); overflow: hidden; }
    h2 { margin: 0; padding: 14px 16px; font-size: 16px; border-bottom: 1px solid #d8dee8; background: #fbfcfe; }
    .body { padding: 16px; }
    .node { margin: 10px 0; padding: 14px; border-radius: 8px; border: 2px solid #d8dee8; opacity: .35; }
    .node.active { opacity: 1; border-color: #2f6fed; }
    .node.root { background: #e7f0ff; }
    .node.map { background: #e9f8ef; }
    .node.filter { background: #fff1d8; }
    .arrow { text-align: center; color: #667085; font-size: 22px; }
    pre { margin: 0; padding: 14px; background: #101828; color: #e6edf7; border-radius: 8px; line-height: 1.55; overflow-x: auto; }
    .explain { min-height: 170px; border: 1px solid #d8dee8; border-radius: 8px; padding: 14px; }
    .controls { display: flex; gap: 10px; padding: 14px 16px; border-top: 1px solid #d8dee8; background: #fbfcfe; }
    button { border: 1px solid #b8c6dc; border-radius: 6px; padding: 9px 14px; background: #fff; cursor: pointer; }
    button.primary { border-color: #2f6fed; background: #2f6fed; color: #fff; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Lineage 血缘可视化</h1>
    <p>点击“下一步”，观察 RDD 如何记录 parent，形成一条来历链。</p>
  </header>
  <main>
    <section>
      <h2>RDD 血缘链</h2>
      <div class="body">
        <div class="node filter" id="filter"><strong>filter RDD</strong><br>operation = filter<br>parent = map RDD</div>
        <div class="arrow">↓ parent</div>
        <div class="node map" id="map"><strong>map RDD</strong><br>operation = map<br>parent = Root RDD</div>
        <div class="arrow">↓ parent</div>
        <div class="node root" id="root"><strong>Root RDD</strong><br>operation = parallelize<br>parent = None</div>
      </div>
      <div class="controls">
        <button id="prev">上一步</button>
        <button class="primary" id="next">下一步</button>
        <button id="reset">重置</button>
      </div>
    </section>
    <section>
      <h2>当前解释</h2>
      <div class="body">
        <div class="explain">
          <h3 id="title"></h3>
          <p id="text"></p>
        </div>
        <h3>to_debug_string()</h3>
        <pre id="debug"></pre>
      </div>
    </section>
  </main>
  <script>
    const steps = [
      { nodes: [], title: "第 0 步：还没有 RDD", text: "还没有创建任何对象。", debug: "" },
      { nodes: ["root"], title: "第 1 步：创建 Root RDD", text: "parallelize 创建 Root RDD。Root RDD 没有 parent。", debug: "parallelize" },
      { nodes: ["root", "map"], title: "第 2 步：map 创建派生 RDD", text: "map RDD 记录 parent = Root RDD，依赖类型是 narrow。", debug: "map\n  parallelize" },
      { nodes: ["root", "map", "filter"], title: "第 3 步：filter 继续创建派生 RDD", text: "filter RDD 记录 parent = map RDD。整条 Lineage 就形成了。", debug: "filter\n  map\n    parallelize" }
    ];
    let index = 0;
    const ids = ["root", "map", "filter"];
    function render() {
      const step = steps[index];
      ids.forEach(id => document.getElementById(id).classList.toggle("active", step.nodes.includes(id)));
      document.getElementById("title").textContent = step.title;
      document.getElementById("text").textContent = step.text;
      document.getElementById("debug").textContent = step.debug;
      document.getElementById("prev").disabled = index === 0;
      document.getElementById("next").disabled = index === steps.length - 1;
    }
    document.getElementById("prev").onclick = () => { if (index > 0) { index -= 1; render(); } };
    document.getElementById("next").onclick = () => { if (index < steps.length - 1) { index += 1; render(); } };
    document.getElementById("reset").onclick = () => { index = 0; render(); };
    render();
  </script>
</body>
</html>
