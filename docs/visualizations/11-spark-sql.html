<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Spark - Spark SQL Plan 可视化</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f6f7f9; color: #20242a; }
    header { padding: 28px 32px 18px; background: #fff; border-bottom: 1px solid #d8dee8; }
    h1 { margin: 0 0 8px; font-size: 26px; }
    main { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 18px; max-width: 1120px; margin: 0 auto; }
    section { background: #fff; border: 1px solid #d8dee8; border-radius: 8px; box-shadow: 0 10px 26px rgba(22, 34, 51, .08); overflow: hidden; }
    h2 { margin: 0; padding: 14px 16px; font-size: 16px; border-bottom: 1px solid #d8dee8; background: #fbfcfe; }
    .body { padding: 16px; }
    .box { margin: 10px 0; padding: 14px; border-radius: 8px; border: 2px solid #d8dee8; opacity: .35; }
    .box.active { opacity: 1; border-color: #2f6fed; }
    pre { padding: 14px; border-radius: 8px; background: #101828; color: #e6edf7; overflow-x: auto; }
    .controls { display: flex; gap: 10px; padding: 14px 16px; border-top: 1px solid #d8dee8; background: #fbfcfe; }
    button { border: 1px solid #b8c6dc; border-radius: 6px; padding: 9px 14px; background: #fff; cursor: pointer; }
    button.primary { border-color: #2f6fed; background: #2f6fed; color: #fff; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .explain { border: 1px solid #d8dee8; border-radius: 8px; padding: 14px; min-height: 150px; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header><h1>Spark SQL Plan 可视化</h1><p>观察 SQL 如何变成 Logical Plan、Physical Plan，最后落到 RDD 执行。</p></header>
  <main>
    <section>
      <h2>计划转换</h2>
      <div class="body">
        <div class="box" id="sql"><strong>SQL</strong><pre>select name from people where age > 18</pre></div>
        <div class="box" id="logical"><strong>Logical Plan</strong><pre>Project[name]
  Filter[age > 18]
    TableScan[people]</pre></div>
        <div class="box" id="physical"><strong>Physical Plan</strong><pre>scan table people
filter age > 18
project name</pre></div>
        <div class="box" id="result"><strong>结果</strong><pre>[{"name": "alice"}]</pre></div>
      </div>
      <div class="controls"><button id="prev">上一步</button><button class="primary" id="next">下一步</button><button id="reset">重置</button></div>
    </section>
    <section><h2>解释</h2><div class="body"><div class="explain"><h3 id="title"></h3><p id="text"></p></div></div></section>
  </main>
  <script>
    const steps = [
      { ids: ["sql"], title: "第 1 步：SQL 字符串", text: "用户写的是想要什么。" },
      { ids: ["sql","logical"], title: "第 2 步：Logical Plan", text: "解析后得到逻辑计划：扫描表、过滤、投影。" },
      { ids: ["sql","logical","physical"], title: "第 3 步：Physical Plan", text: "物理计划描述具体执行步骤。" },
      { ids: ["sql","logical","physical","result"], title: "第 4 步：执行并返回结果", text: "Mini Spark 把计划映射到 RDD 的 filter 和 map。" }
    ];
    let index = 0;
    const ids = ["sql","logical","physical","result"];
    function render() {
      const step = steps[index];
      ids.forEach(id => document.getElementById(id).classList.toggle("active", step.ids.includes(id)));
      document.getElementById("title").textContent = step.title;
      document.getElementById("text").textContent = step.text;
      document.getElementById("prev").disabled = index === 0;
      document.getElementById("next").disabled = index === steps.length - 1;
    }
    document.getElementById("prev").onclick = () => { if (index > 0) { index -= 1; render(); } };
    document.getElementById("next").onclick = () => { if (index < steps.length - 1) { index += 1; render(); } };
    document.getElementById("reset").onclick = () => { index = 0; render(); };
    render();
  </script>
</body>
</html>
